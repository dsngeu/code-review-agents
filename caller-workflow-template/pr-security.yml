name: Security Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  trigger-security-review:
    uses: dsngeu/code-review-agents/.github/workflows/security-review.yml@main
    with:
      repo: ${{ github.repository }}
      pr_number: ${{ github.event.pull_request.number }}
      head_sha: ${{ github.event.pull_request.head.sha }}
      # The PR author is auto-mentioned. This passes their username through.
      pr_author: ${{ github.event.pull_request.user.login }}
      # Extra users always mentioned in addition to the PR author (comma-separated,
      # @ optional). Leave empty to use the hardcoded defaults in the agent.
      notify_users: ''
      # agent_ref: main   # ref of the agent repo to run; set to a branch to test changes
    secrets: inherit

name: Branch Review

# Manual full-branch review (general quality + security).
# Pick the branch to review in the "Use workflow from" dropdown — that branch
# is what gets reviewed (vs the repo's default branch). Just choose a branch + model.
on:
  workflow_dispatch:
    inputs:
      model:
        description: 'Claude model id'
        required: false
        type: string
        default: 'claude-sonnet-4-6'

permissions:
  contents: read

jobs:
  trigger-branch-review:
    uses: dsngeu/code-review-agents/.github/workflows/branch-review.yml@main
    with:
      repo: ${{ github.repository }}
      ref: ${{ github.ref_name }}   # the branch picked in "Use workflow from"
      base: ''                       # diff against the repo default branch
      model: ${{ inputs.model }}
      # agent_ref: main              # ref of the agent repo to run; set to a branch to test changes
    secrets: inherit

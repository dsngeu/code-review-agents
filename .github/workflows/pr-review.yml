name: Code Review (Reusable)

on:
  workflow_call:
    inputs:
      repo:
        description: 'Target repo in owner/name format'
        required: true
        type: string
      pr_number:
        description: 'Pull request number'
        required: true
        type: number
      head_sha:
        description: 'HEAD SHA of the PR branch'
        required: true
        type: string
      pr_author:
        description: 'GitHub username of the PR author (auto @-mentioned).'
        required: false
        type: string
        default: ''
      notify_users:
        description: 'Extra comma-separated usernames to @-mention on HIGH/CRITICAL.'
        required: false
        type: string
        default: ''
      model:
        description: 'Claude model id (default claude-sonnet-4-6).'
        required: false
        type: string
        default: 'claude-sonnet-4-6'
      agent_ref:
        description: 'Ref (branch/tag/SHA) of the agent repo to run. Defaults to main; set to a branch to test changes.'
        required: false
        type: string
        default: 'main'
    secrets:
      ANTHROPIC_API_KEY:
        required: true
      GH_PAT:
        required: true

# Cost saver: when a newer push to the same PR triggers another code review,
# cancel the in-progress (now-stale) one instead of paying for it to finish — its
# comment would be overwritten by the newer run anyway. Keyed per repo + PR, and
# prefixed `code-` so it never cancels the separate Security Review workflow.
# No quality impact: only superseded commits' reviews are cancelled.
concurrency:
  group: code-review-${{ inputs.repo }}-${{ inputs.pr_number }}
  cancel-in-progress: true

jobs:
  code-review:
    runs-on: ubuntu-latest
    # Read code + comment only. `contents: read` means the runner token cannot
    # push, edit files, or delete branches; only PR comments + check runs.
    permissions:
      contents: read
      checks: write
      pull-requests: write
    steps:
      - name: Checkout agent repo
        uses: actions/checkout@v4
        with:
          repository: dsngeu/code-review-agents
          ref: ${{ inputs.agent_ref }}
          token: ${{ secrets.GH_PAT }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Code Review Agent
        run: node agents/review/pr.js
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ github.token }}
          TARGET_REPO: ${{ inputs.repo }}
          PR_NUMBER: ${{ inputs.pr_number }}
          HEAD_SHA: ${{ inputs.head_sha }}
          PR_AUTHOR: ${{ inputs.pr_author }}
          NOTIFY_USERS: ${{ inputs.notify_users }}
          MODEL: ${{ inputs.model }}

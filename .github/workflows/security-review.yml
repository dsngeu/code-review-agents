name: Security Review (Reusable)

on:
  workflow_call:
    inputs:
      repo:
        description: 'Target repo in owner/name format (e.g. dsngeu/news)'
        required: true
        type: string
      pr_number:
        description: 'Pull request number'
        required: true
        type: number
      head_sha:
        description: 'HEAD SHA of the PR branch'
        required: true
        type: string
      pr_author:
        description: 'GitHub username of the PR author (auto @-mentioned).'
        required: false
        type: string
        default: ''
      notify_users:
        description: 'Extra comma-separated GitHub usernames to always @-mention on HIGH/CRITICAL, in addition to the PR author. The @ is optional.'
        required: false
        type: string
        default: ''
      model:
        description: 'Claude model id (default claude-sonnet-4-6).'
        required: false
        type: string
        default: 'claude-sonnet-4-6'
      agent_ref:
        description: 'Ref (branch/tag/SHA) of the agent repo to run. Defaults to main; set to a branch to test changes.'
        required: false
        type: string
        default: 'main'
    secrets:
      ANTHROPIC_API_KEY:
        required: true
      GH_PAT:
        required: true

jobs:
  security-review:
    runs-on: ubuntu-latest
    # Read code + comment only. `contents: read` means the runner token cannot
    # push, edit files, or delete branches; only PR comments + check runs.
    permissions:
      contents: read
      checks: write
      pull-requests: write
    steps:
      - name: Checkout agent repo
        uses: actions/checkout@v4
        with:
          repository: dsngeu/code-review-agents
          ref: ${{ inputs.agent_ref }}
          token: ${{ secrets.GH_PAT }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Security Review Agent
        run: node agents/security/index.js
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # Built-in Actions token (a GitHub App token) — required to create
          # Check Runs and post comments on the target repo. GH_PAT cannot
          # create Check Runs (Checks API rejects classic PATs with 403).
          GH_TOKEN: ${{ github.token }}
          TARGET_REPO: ${{ inputs.repo }}
          PR_NUMBER: ${{ inputs.pr_number }}
          HEAD_SHA: ${{ inputs.head_sha }}
          PR_AUTHOR: ${{ inputs.pr_author }}
          NOTIFY_USERS: ${{ inputs.notify_users }}
          MODEL: ${{ inputs.model }}

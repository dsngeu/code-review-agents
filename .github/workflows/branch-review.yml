name: Branch Review (Reusable)

on:
  workflow_call:
    inputs:
      repo:
        description: 'Target repo in owner/name format'
        required: true
        type: string
      ref:
        description: 'Branch (or ref) to review'
        required: true
        type: string
      base:
        description: 'Base ref to diff against (default: repo default branch)'
        required: false
        type: string
        default: ''
      model:
        description: 'Claude model id (default claude-sonnet-4-6).'
        required: false
        type: string
        default: 'claude-sonnet-4-6'
      agent_ref:
        description: 'Ref (branch/tag/SHA) of the agent repo to run. Defaults to main; set to a branch to test changes.'
        required: false
        type: string
        default: 'main'
    secrets:
      ANTHROPIC_API_KEY:
        required: true
      GH_PAT:
        required: true

jobs:
  branch-review:
    runs-on: ubuntu-latest
    # Read-only: this agent only reads code and writes the Actions Job Summary.
    # The runner token cannot push, edit files, or delete branches.
    permissions:
      contents: read
    steps:
      - name: Checkout agent repo
        uses: actions/checkout@v4
        with:
          repository: dsngeu/code-review-agents
          ref: ${{ inputs.agent_ref }}
          token: ${{ secrets.GH_PAT }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Branch Review Agent
        run: node agents/review/branch.js
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ github.token }}
          TARGET_REPO: ${{ inputs.repo }}
          REF: ${{ inputs.ref }}
          BASE: ${{ inputs.base }}
          MODEL: ${{ inputs.model }}
